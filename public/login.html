<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR schedule.com | Sign up or log in</title>
    <meta name="description" content="Sign up or log in flow for customers and professionals." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-shell">
        <section class="login-panel">
          <div class="login-topbar">
            <a class="back-link" href="/" aria-label="Go back">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M15 5l-7 7 7 7"></path>
              </svg>
            </a>
          </div>

          <div class="login-content">
            <p class="login-eyebrow">Choose your experience</p>
            <h1>Sign up/log in</h1>
            <p class="login-subtitle">
              Continue as a customer to book services, or as a professional to manage your business.
            </p>

            <div class="login-options">
              <a class="login-card" href="/">
                <div>
                  <strong>Fresha for customers</strong>
                  <span>Book salons and spas near you</span>
                </div>
                <span class="card-arrow" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M5 12h14"></path>
                    <path d="M13 6l6 6-6 6"></path>
                  </svg>
                </span>
              </a>

              <a class="login-card" href="/for-businesses">
                <div>
                  <strong>Fresha for professionals</strong>
                  <span>Manage and grow your business</span>
                </div>
                <span class="card-arrow" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M5 12h14"></path>
                    <path d="M13 6l6 6-6 6"></path>
                  </svg>
                </span>
              </a>
            </div>
          </div>

          <div class="login-footer">
            <a href="/" class="footer-link">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <circle cx="12" cy="12" r="8"></circle>
                <path d="M4 12h16M12 4a14 14 0 010 16M12 4a14 14 0 000 16"></path>
              </svg>
              <span>English</span>
            </a>
            <a href="/help" class="footer-link">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <circle cx="12" cy="12" r="8"></circle>
                <path d="M9.5 9.5a2.5 2.5 0 115 0c0 1.5-2.5 2-2.5 4"></path>
                <circle cx="12" cy="17" r="0.8" fill="currentColor" stroke="none"></circle>
              </svg>
              <span>Help and support</span>
            </a>
          </div>
        </section>

        <section class="login-visual" aria-hidden="true">
          <div class="visual-scene">
            <div class="scene-building building-left"></div>
            <div class="scene-building building-mid"></div>
            <div class="scene-building building-right"></div>
            <div class="scene-car car-red"></div>
            <div class="scene-car car-silver"></div>
            <div class="person-figure">
              <div class="person-head"></div>
              <div class="person-hair"></div>
              <div class="person-glasses"></div>
              <div class="person-jacket"></div>
              <div class="person-shirt"></div>
              <div class="person-phone"></div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
