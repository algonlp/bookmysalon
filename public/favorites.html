<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR schedule.com | Favorites</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="customer-profile-page customer-favorites-page">
      <header class="customer-profile-topbar">
        <a class="brand" href="/">QR schedule.com</a>
        <div class="header-actions"></div>
      </header>
      <div class="customer-profile-layout">
        <aside class="customer-profile-sidebar">
          <strong id="customer-profile-sidebar-name">Customer</strong>
          <nav aria-label="Customer account">
            <a href="/profile">Profile</a>
            <a href="/activity">Activity</a>
            <a href="/wallet">Wallet</a>
            <a href="/messages">Messages</a>
            <a class="is-active" href="/favorites">Favorites</a>
            <a href="/forms">Forms</a>
            <a href="/settings">Settings</a>
          </nav>
        </aside>
        <main class="customer-profile-main customer-empty-main">
          <section class="customer-simple-empty">
            <div class="customer-simple-empty-icon">♥</div>
            <h1 id="customer-favorites-title">No favorites</h1>
            <p id="customer-favorites-copy">Your favorites list is empty. Let's fill it up!</p>
            <a href="/">Start searching</a>
          </section>
        </main>
      </div>
    </div>
    <script src="/main.js"></script>
  </body>
</html>
