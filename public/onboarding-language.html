<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR schedule.com | Select language</title>
    <meta
      name="description"
      content="Choose the default language for your business setup and customer-facing experience."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="onboarding-language-page">
    <div class="onboarding-page">
      <div class="onboarding-shell">
        <header class="onboarding-header">
          <div class="onboarding-top-left">
            <a class="onboarding-back" href="/onboarding/launch-links" aria-label="Go back">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M15 5l-7 7 7 7"></path>
              </svg>
            </a>

            <div class="onboarding-progress">
              <span class="progress-bar progress-bar-active"></span>
              <span class="progress-bar progress-bar-active"></span>
              <span class="progress-bar progress-bar-active"></span>
              <span class="progress-bar progress-bar-active"></span>
              <span class="progress-bar progress-bar-active"></span>
              <span class="progress-bar progress-bar-active"></span>
            </div>
          </div>
        </header>

        <main class="onboarding-main">
          <section class="onboarding-copy">
            <p class="onboarding-eyebrow">Account setup</p>
            <h1>Select your default language</h1>
            <p class="onboarding-description">
              Choose the language you want to use first in setup and client-facing screens.
              You can change it later from your dashboard settings.
            </p>
          </section>

          <section
            class="account-type-grid onboarding-language-grid"
            id="preferred-language-grid"
            aria-live="polite"
          ></section>
        </main>

        <div class="onboarding-footer">
          <a
            class="continue-button onboarding-continue onboarding-continue-disabled"
            id="preferred-language-continue"
            href="/onboarding/complete"
            aria-disabled="true"
          >
            Continue
          </a>
        </div>
      </div>
    </div>

    <script src="/main.js"></script>
  </body>
</html>
