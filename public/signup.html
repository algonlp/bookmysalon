<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR schedule.com | QR schedule</title>
    <meta
      name="description"
      content="Create an account or log in to manage your business."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="pro-signup-page">
      <div class="pro-signup-shell">
        <section class="pro-signup-panel">
          <div class="login-topbar">
            <a class="back-link" href="/for-businesses" aria-label="Go back">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M15 5l-7 7 7 7"></path>
              </svg>
            </a>
          </div>

          <div class="pro-signup-content">
            <h1>QR schedule</h1>
            <p id="pro-signup-heading-text">Log in to manage your business.</p>

            <form
              class="pro-signup-form"
              id="pro-signup-form"
              action="/onboarding/business-name"
              data-create-endpoint="/api/platform/clients"
              data-google-auth-endpoint="/api/platform/clients/google-auth"
              data-login-endpoint="/api/platform/clients/login"
              data-verify-otp-endpoint="/api/platform/clients/otp/verify"
              data-verify-signup-otp-endpoint="/api/platform/clients/signup/verify"
            >
              <div class="pro-signup-form-intro" id="pro-signup-form-intro">
                <strong id="pro-signup-form-title">Log in to your workspace</strong>
                <span id="pro-signup-form-subtitle">Enter your email or mobile number and password.</span>
              </div>

              <label class="signup-input-wrap">
                <input
                  id="professional-email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  placeholder="Enter your email address"
                />
              </label>

              <label class="signup-input-wrap is-hidden" id="professional-name-wrap">
                <input
                  id="professional-name"
                  name="businessName"
                  type="text"
                  autocomplete="organization"
                  placeholder="Your name or business name"
                />
              </label>

              <label class="signup-input-wrap is-hidden" id="professional-mobile-wrap">
                <input
                  id="professional-mobile"
                  name="mobileNumber"
                  type="tel"
                  inputmode="tel"
                  autocomplete="tel"
                  placeholder="Enter your mobile number"
                />
              </label>

              <label class="signup-input-wrap">
                <input
                  id="professional-password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="Enter your password"
                  minlength="6"
                />
              </label>

              <button class="continue-button" type="submit">
                <span>Continue</span>
                <span class="continue-button-arrow" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M5 12h14"></path>
                    <path d="M13 6l6 6-6 6"></path>
                  </svg>
                </span>
              </button>

              <div class="pro-signup-otp is-hidden" id="pro-signup-otp-panel">
                <p class="pro-signup-otp-copy" id="pro-signup-otp-message">
                  Enter the verification code sent to your mobile number.
                </p>

                <label class="signup-input-wrap">
                  <input
                    id="pro-signup-otp-code"
                    name="otpCode"
                    type="text"
                    inputmode="numeric"
                    autocomplete="one-time-code"
                    maxlength="6"
                    placeholder="Enter 6-digit code"
                  />
                </label>

                <button class="continue-button" type="button" id="pro-signup-verify-otp">
                  <span>Verify and continue</span>
                  <span class="continue-button-arrow" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path d="M5 12h14"></path>
                      <path d="M13 6l6 6-6 6"></path>
                    </svg>
                  </span>
                </button>
              </div>

              <p class="pro-signup-status" id="pro-signup-status" aria-live="polite"></p>
            </form>

            <div class="pro-signup-toggle">
              <p id="pro-signup-toggle-text">Don't have an account? <a href="#" id="pro-signup-toggle-link">Sign up</a></p>
            </div>

            <span class="divider-copy">OR</span>

            <div class="social-stack">
              <div class="google-signin-host is-hidden" id="google-signin-host"></div>
              <button class="social-button" type="button" data-auth-provider="google">
                <span class="social-icon google">G</span>
                <span>Continue with Google</span>
              </button>
            </div>
          </div>

          <div class="pro-signup-footer">
            <p>Are you a customer looking to book an appointment?</p>
          </div>
        </section>

      </div>
    </div>

    <script src="/main.js"></script>
  </body>
</html>
