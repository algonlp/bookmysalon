<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR schedule.com | Business setup complete</title>
    <meta
      name="description"
      content="Business onboarding completed successfully."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="onboarding-page onboarding-complete-page">
      <main class="onboarding-complete-shell">
        <p class="onboarding-eyebrow onboarding-complete-eyebrow">Account setup</p>

        <div class="onboarding-complete-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path d="M5 12.5l4.2 4.2L19 7"></path>
          </svg>
        </div>

        <h1>Your business is set up!</h1>
        <p class="onboarding-complete-copy">
          Your account is ready. You can now open the calendar, manage bookings,
          and continue building your business profile.
        </p>
        <p class="onboarding-complete-subcopy">Enjoy 7 days free of using Fresha for business</p>

        <div class="onboarding-complete-highlights" aria-label="Setup summary">
          <span>Calendar ready</span>
          <span>Booking flow enabled</span>
          <span>7-day free trial</span>
        </div>

        <a class="continue-button onboarding-complete-done" id="onboarding-complete-done" href="/calendar">
          Done
          <span class="continue-button-arrow" aria-hidden="true">→</span>
        </a>
      </main>
    </div>
  </body>
</html>
