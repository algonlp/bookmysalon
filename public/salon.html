<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR schedule.com | Business details</title>
    <meta
      name="description"
      content="Review services, ratings, team, and location before booking a local selfcare appointment."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page salon-profile-page">
      <header class="site-header">
        <a class="brand" href="/" aria-label="QR schedule.com home">QR schedule.com</a>

        <form class="salon-header-search" role="search" aria-label="Search this salon">
          <button type="button" data-salon-search-control="service">All treatments</button>
          <button type="button" data-salon-search-control="location">Current location</button>
          <button type="button" data-salon-search-control="time">Any time</button>
          <button class="salon-header-search-submit" type="submit" aria-label="Search">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M16 16l4 4"></path>
            </svg>
          </button>
          <div class="salon-header-search-popover is-hidden" data-salon-search-popover></div>
        </form>

        <div class="header-actions">
          <div class="menu-wrap">
            <button
              class="pill-button menu-button"
              id="menu-toggle"
              type="button"
              aria-label="Open menu"
              aria-expanded="false"
              aria-controls="site-menu"
            >
              <span>Menu</span>
              <span class="menu-lines" aria-hidden="true">
                <span></span>
                <span></span>
              </span>
            </button>

            <div class="menu-popover is-hidden" id="site-menu">
              <div class="menu-section">
                <p class="menu-heading">For customers</p>
                <a href="/login">Log in</a>
                <a href="/help">Help and support</a>
              </div>

              <div class="menu-divider"></div>

              <a href="/for-businesses" class="menu-business-link">
                <span>For businesses</span>
                <span class="business-arrow" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M5 12h14"></path>
                    <path d="M13 6l6 6-6 6"></path>
                  </svg>
                </span>
              </a>
            </div>
          </div>
        </div>
      </header>

      <main class="salon-profile-shell">
        <p class="salon-profile-status" id="salon-profile-status">Loading business details...</p>

        <section
          class="salon-detail-panel salon-detail-page-panel is-hidden"
          id="salon-detail-panel"
          aria-live="polite"
          aria-labelledby="salon-detail-title"
        >
          <div class="salon-detail-tabs" aria-label="Business detail sections">
            <button class="is-active" type="button" data-detail-tab="services">Services</button>
            <button type="button" data-detail-tab="team">Team</button>
            <button type="button" data-detail-tab="reviews">Reviews</button>
            <button type="button" data-detail-tab="about">About</button>
          </div>

          <div class="salon-detail-layout">
            <div class="salon-detail-main" id="salon-detail-main"></div>
            <aside class="salon-detail-card" id="salon-detail-card"></aside>
          </div>
        </section>
      </main>
    </div>

    <script src="/main.js"></script>
  </body>
</html>
