<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR schedule.com | Legendary Learner</title>
    <meta
      name="description"
      content="Guided setup checklist for getting started with your Fresha-style business dashboard."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="setup-guide-page">
      <aside class="setup-guide-sidebar" aria-label="Guide navigation">
        <a class="setup-guide-brand" id="setup-guide-back-link" href="/calendar">fresha</a>

        <nav class="setup-guide-nav">
          <a class="setup-guide-nav-link" href="#">
            <span class="setup-guide-nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false"><path d="M12 3l7 4v5c0 5-3.5 8-7 9-3.5-1-7-4-7-9V7z"></path><path d="M9.5 10.5L12 8l2.5 2.5"></path><path d="M12 8v8"></path></svg>
            </span>
            <span>News</span>
          </a>
          <a class="setup-guide-nav-link" href="#">
            <span class="setup-guide-nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false"><circle cx="12" cy="12" r="9"></circle><path d="M9.1 9a3 3 0 015.8 1c0 2-3 2-3 4"></path><path d="M12 17h.01"></path></svg>
            </span>
            <span>Help</span>
          </a>
          <a class="setup-guide-nav-link is-active" href="/guides/legendary-learner">
            <span class="setup-guide-nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false"><path d="M5 5h14v14H5z"></path><path d="M8 9h8M8 12h8M8 15h5"></path></svg>
            </span>
            <span>Guides</span>
          </a>
        </nav>
      </aside>

      <main class="setup-guide-main">
        <section class="setup-guide-panel">
          <header class="setup-guide-hero">
            <h1>Legendary Learner</h1>
          </header>

          <div class="setup-guide-list" role="list" aria-label="Guide steps">
            <div class="setup-guide-item is-complete" role="listitem">
              <div class="setup-guide-step">1</div>
              <div class="setup-guide-copy">Create your Fresha account</div>
              <div class="setup-guide-item-end is-success" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false"><path d="M5 12.5l4.2 4.2L19 7"></path></svg>
              </div>
            </div>

            <a class="setup-guide-item" id="setup-guide-appointment-link" href="/calendar" role="listitem">
              <div class="setup-guide-step">2</div>
              <div class="setup-guide-copy">Add your barber</div>
              <div class="setup-guide-item-end" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false"><path d="M9 6l6 6-6 6"></path></svg>
              </div>
            </a>

            <a class="setup-guide-item" id="setup-guide-service-link" href="/calendar" role="listitem">
              <div class="setup-guide-step">3</div>
              <div class="setup-guide-copy">Add your services</div>
              <div class="setup-guide-item-end" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false"><path d="M9 6l6 6-6 6"></path></svg>
              </div>
            </a>

            <a class="setup-guide-item" id="setup-guide-booking-link" href="/calendar" role="listitem">
              <div class="setup-guide-step">4</div>
              <div class="setup-guide-copy">Create your first appointment</div>
              <div class="setup-guide-item-end" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false"><path d="M9 6l6 6-6 6"></path></svg>
              </div>
            </a>

            <a class="setup-guide-item" id="setup-guide-checkout-link" href="/calendar" role="listitem">
              <div class="setup-guide-step">5</div>
              <div class="setup-guide-copy">Check out an appointment</div>
              <div class="setup-guide-item-end" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false"><path d="M9 6l6 6-6 6"></path></svg>
              </div>
            </a>
          </div>

          <a class="setup-guide-skip" id="setup-guide-skip-link" href="/calendar">
            <span>Skip this guide</span>
            <svg viewBox="0 0 24 24" focusable="false"><path d="M5 12h14"></path><path d="M13 6l6 6-6 6"></path></svg>
          </a>

          <section class="setup-guide-help-card">
            <div class="setup-guide-help-copy">
              <h2>Help center</h2>
              <p>Learn and grow with our help center and knowledge base</p>
              <a class="setup-guide-help-link" href="#">
                <span>Go to help center</span>
                <svg viewBox="0 0 24 24" focusable="false"><path d="M5 12h14"></path><path d="M13 6l6 6-6 6"></path></svg>
              </a>
            </div>

            <div class="setup-guide-help-mark" aria-hidden="true">
              <span></span>
              <span></span>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="/main.js"></script>
  </body>
</html>
