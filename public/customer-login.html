<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR schedule.com | Sign up or log in</title>
    <meta
      name="description"
      content="Create a customer account or log in to save favourites and manage appointments."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="customer-login-page">
      <section class="customer-login-panel">
        <div class="login-topbar">
          <a class="back-link" href="/login" aria-label="Go back" id="customer-login-back">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M15 5l-7 7 7 7"></path>
            </svg>
          </a>
        </div>

        <form
          class="customer-login-form"
          id="customer-login-form"
          data-request-phone-otp-endpoint="/api/public/customer-auth/otp/request"
          data-verify-phone-otp-endpoint="/api/public/customer-auth/otp/verify"
          data-request-email-otp-endpoint="/api/public/customer-auth/email-otp/request"
          data-verify-email-otp-endpoint="/api/public/customer-auth/email-otp/verify"
        >
          <!-- Step 1: Email or phone input -->
          <div class="login-step" id="login-step-entry">
            <div class="customer-login-copy">
              <h1>Sign up or log in</h1>
              <p>Enter your email or mobile number to continue.</p>
            </div>

            <label class="customer-login-field">
              <span>Email or mobile number</span>
              <input
                id="customer-login-entry"
                name="entry"
                type="text"
                inputmode="email"
                autocomplete="email"
                placeholder="you@example.com or +923001234567"
              />
            </label>

            <button class="customer-login-primary" type="button" id="login-entry-continue">
              Continue
            </button>

            <div class="customer-login-divider"><span>OR</span></div>

            <button class="customer-login-google" type="button" disabled>
              <svg viewBox="0 0 24 24" width="18" height="18" focusable="false" aria-hidden="true">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              Continue with Google
            </button>
          </div>

          <!-- Step 2: OTP entry -->
          <div class="login-step is-hidden" id="login-step-otp">
            <div class="customer-login-copy">
              <h1>Enter your code</h1>
              <p id="login-otp-subtitle">We sent you a 6-digit verification code.</p>
            </div>

            <label class="customer-login-field">
              <span>Verification code</span>
              <input
                id="customer-login-code"
                name="code"
                type="text"
                inputmode="numeric"
                autocomplete="one-time-code"
                maxlength="6"
                placeholder="123456"
              />
            </label>

            <button class="customer-login-primary" type="button" id="customer-login-verify">
              Verify and continue
            </button>

            <button class="customer-login-resend" type="button" id="customer-login-resend">
              Resend code
            </button>
          </div>

          <p class="customer-login-status" id="customer-login-status" aria-live="polite"></p>

          <p class="customer-login-owner-link">
            Have a business account?
            <a href="/signup">Go to QR Schedule for professionals</a>
          </p>
        </form>
      </section>

      <aside class="customer-login-visual" aria-hidden="true"></aside>
    </div>

    <script src="/main.js"></script>
  </body>
</html>
