<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR schedule.com | Barber login</title>
    <meta
      name="description"
      content="Log in as a barber to see your own appointments and tips."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="cl-page">
      <div class="cl-topbar">
        <a class="cl-topbar-back back-link" href="/login" aria-label="Go back">
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M15 5l-7 7 7 7"></path>
          </svg>
        </a>
        <a class="cl-topbar-brand brand" href="/">QR Schedule</a>
      </div>

      <main class="cl-main">
        <form
          class="cl-card"
          id="barber-login-form"
          data-login-endpoint="/api/platform/staff-login"
        >
          <h1 class="cl-heading">Barber login</h1>
          <p class="cl-subheading">Enter the username and password your salon admin gave you.</p>

          <div class="cl-input-wrap">
            <span class="cl-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <circle cx="12" cy="8" r="4"></circle>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"></path>
              </svg>
            </span>
            <input
              class="cl-input"
              id="barber-login-username"
              name="username"
              type="text"
              autocomplete="username"
              placeholder="Username"
            />
          </div>

          <div class="cl-input-wrap">
            <span class="cl-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <rect x="3" y="11" width="18" height="11" rx="2"></rect>
                <path d="M7 11V7a5 5 0 0110 0v4"></path>
              </svg>
            </span>
            <input
              class="cl-input"
              id="barber-login-password"
              name="password"
              type="password"
              inputmode="numeric"
              autocomplete="current-password"
              maxlength="6"
              placeholder="6-digit password"
            />
          </div>

          <label class="cl-remember-me" id="barber-login-remember-me-wrap">
            <input type="checkbox" id="barber-login-remember-me" name="rememberMe" checked />
            <span>Remember me</span>
          </label>

          <button class="cl-btn-primary" type="button" id="barber-login-submit">
            Log in
          </button>

          <p class="cl-status" id="barber-login-status" aria-live="polite"></p>
        </form>
      </main>
    </div>

    <script src="/main.js"></script>
  </body>
</html>
