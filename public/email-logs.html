<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR schedule.com | Email logs</title>
    <meta
      name="description"
      content="Review all email delivery attempts for your booking confirmations and updates."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="sms-logs-page">
      <div class="sms-logs-shell">
        <header class="sms-logs-header">
          <div class="sms-logs-header-copy">
            <p class="sms-logs-eyebrow">Communication</p>
            <h1>Email logs</h1>
            <p>
              Review every confirmation, update, and welcome email attempt for this business.
            </p>
          </div>
          <a class="calendar-booking-link sms-logs-back-link" id="email-logs-back-link" href="/calendar">
            Return to dashboard
          </a>
        </header>

        <section class="sms-logs-summary" id="email-logs-summary">
          <article class="sms-logs-metric">
            <span>Total</span>
            <strong id="email-logs-total">0</strong>
          </article>
          <article class="sms-logs-metric">
            <span>Sent</span>
            <strong id="email-logs-sent">0</strong>
          </article>
          <article class="sms-logs-metric">
            <span>Failed</span>
            <strong id="email-logs-failed">0</strong>
          </article>
          <article class="sms-logs-metric">
            <span>Skipped</span>
            <strong id="email-logs-skipped">0</strong>
          </article>
        </section>

        <section class="sms-logs-feed" id="email-logs-feed" aria-live="polite">
          <article class="sms-log-empty">
            <h2>No email logs yet</h2>
            <p>Send a booking confirmation or welcome email to start seeing delivery history here.</p>
          </article>
        </section>
      </div>
    </div>

    <script src="/main.js"></script>
  </body>
</html>
